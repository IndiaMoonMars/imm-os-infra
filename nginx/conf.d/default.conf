server {
      listen 80;
    server_name localhost;

    location /api {
              proxy_pass http://imm-os-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
}

    location /openmct {
              proxy_pass http://imm-os-openmct:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
}

    location /auth {
              proxy_pass http://keycloak:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
}
}
