

# ════════════════════════════════════════════════════════════════
#  IMM-OS Infrastructure Stack  ·  Phase 0
#  Services: postgres · influxdb · mosquitto · kafka · zookeeper
#            keycloak · nginx
#  App stubs: backend · frontend · openmct  (replaced in Phase 1)
# ════════════════════════════════════════════════════════════════

services:

  # ── Data stores ────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: imm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: imm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d imm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7-alpine
    container_name: imm-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-changeme123}
      DOCKER_INFLUXDB_INIT_ORG: imm_org
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-imm-super-secret-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: imm-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t health -m ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: imm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── Message queue ──────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: imm-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: imm-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Auth ───────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: imm-keycloak
    command: start-dev --http-relative-path=/auth
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/imm_db
      KC_DB_USERNAME: ${POSTGRES_USER:-admin}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/auth/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── Sensor Simulator (replaces real RPi/Jetson until hardware arrives) ─

  sensor-sim:
    build:
      context: ../imm-os-edge/simulator
      dockerfile: Dockerfile
    container_name: imm-sensor-sim
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      PUBLISH_INTERVAL_S: 5
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  # ── Telemetry Worker (MQTT → InfluxDB bridge) ──────────────────

  telemetry-worker:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-telemetry-worker
    command: ["python", "-u", "services/telemetry_worker.py"]
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN:-imm-super-secret-token}
      INFLUX_ORG: imm_org
      INFLUX_BUCKET: telemetry
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # ── Application stubs (Phase 0 — replaced by real images in Phase 1) ──

  telemetry-ingest:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-telemetry-ingest
    command: ["uvicorn", "services.telemetry_ingest:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

  telemetry-processor:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-telemetry-processor
    command: ["python", "-u", "services/telemetry_processor.py"]
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN:-imm-super-secret-token}
      INFLUX_ORG: imm_org
    depends_on:
      kafka:
        condition: service_started
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  mqtt-kafka-bridge:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-mqtt-kafka-bridge
    command: ["python", "-u", "services/mqtt_to_kafka_bridge.py"]
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on:
      mosquitto:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  time-service:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-time-service
    command: ["uvicorn", "services.time_service.api:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "8002:8002"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  eclss-api:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-eclss-api
    command: ["uvicorn", "services.eclss_api:app", "--host", "0.0.0.0", "--port", "8003"]
    ports:
      - "8003:8003"
    restart: unless-stopped

  eva-api:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-eva-api
    command: ["uvicorn", "services.eva_api:app", "--host", "0.0.0.0", "--port", "8004"]
    ports:
      - "8004:8004"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-imm_db}
    depends_on:
      - postgres
    restart: unless-stopped

  comms-api:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-comms-api
    command: ["uvicorn", "services.comms_api:app", "--host", "0.0.0.0", "--port", "8005"]
    ports:
      - "8005:8005"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-imm_db}
      TIME_SERVICE_URL: http://time-service:8002
      ECLSS_API_URL: http://eclss-api:8003
      MEDIA_DIR: /app/media
    volumes:
      - comms_media:/app/media
    depends_on:
      - postgres
      - time-service
      - eclss-api
    restart: unless-stopped

  scheduling-api:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-scheduling-api
    command: ["uvicorn", "services.scheduling_api:app", "--host", "0.0.0.0", "--port", "8006"]
    ports:
      - "8006:8006"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-imm_db}
      TIME_SERVICE_URL: http://time-service:8002
      COMMS_API_URL: http://comms-api:8005
    depends_on:
      - postgres
      - time-service
      - comms-api
    restart: unless-stopped

  medical-api:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-medical-api
    command: ["uvicorn", "services.medical_api:app", "--host", "0.0.0.0", "--port", "8007"]
    ports:
      - "8007:8007"
    environment:
      DATABASE_URL: postgresql://imm_user:imm_pass@postgres:5432/imm_db
      COMMS_URL: http://comms-api:8005
    depends_on:
      - postgres
      - comms-api
    restart: unless-stopped

  psych-api:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-psych-api
    command: ["uvicorn", "services.psychology_api:app", "--host", "0.0.0.0", "--port", "8008"]
    ports:
      - "8008:8008"
    environment:
      DATABASE_URL: postgresql://imm_user:imm_pass@postgres:5432/imm_db
      COMMS_URL: http://comms-api:8005
    depends_on:
      - postgres
      - comms-api
    restart: unless-stopped

  ai-processor:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-ai-processor
    command: ["python", "services/ai_processor.py"]
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: imm-super-secret-token
      POSTGRES_HOST: postgres
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mission-assistant:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-mission-assistant
    command: ["uvicorn", "services.mission_assistant_api:app", "--host", "0.0.0.0", "--port", "8009"]
    ports:
      - "8009:8009"
    environment:
      DATABASE_URL: postgresql://imm_user:imm_pass@postgres:5432/imm_db
      INFLUX_URL: http://influxdb:8086
    depends_on:
      - postgres
      - influxdb
    restart: unless-stopped

  auto-control:
    build:
      context: ../imm-os-backend
      dockerfile: Dockerfile
    container_name: imm-auto-control
    command: ["python", "services/auto_control_service.py"]
    environment:
      ECLSS_URL: http://eclss-api:8003
      POSTGRES_HOST: postgres
    depends_on:
      - postgres
      - eclss-api
    restart: unless-stopped

  backend:
    image: traefik/whoami
    container_name: imm-backend-stub
    hostname: backend
    command: --port=8080
    restart: unless-stopped

  frontend:
    build:
      context: ../imm-os-frontend
      dockerfile: Dockerfile
    container_name: imm-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped

  openmct:
    build:
      context: ../imm-os-openmct
      dockerfile: Dockerfile
    container_name: imm-openmct
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ── Reverse proxy ──────────────────────────────────────────────

  nginx:
    image: nginx:stable-alpine
    container_name: imm-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend
      - frontend
      - openmct
      - keycloak
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.2
    container_name: imm-grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  influxdb_data:
  mosquitto_data:
  mosquitto_log:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  redis_data:
  comms_media:
