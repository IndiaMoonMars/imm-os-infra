# Mosquitto MQTT broker configuration
# IMM-OS Phase 0 — Development / Simulator mode
#
# ⚠️  Phase 1 security upgrade: switch to listener 8883 with TLS certs
#     password_file, require_certificate true, allow_anonymous false

listener 1883
allow_anonymous true

# Persistence — survives container restarts
persistence true
persistence_location /mosquitto/data/

# Logging to stdout → docker compose logs mosquitto
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# Allow payloads up to 10 KB
message_size_limit 10240
